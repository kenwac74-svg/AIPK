name: Publish LONGRISE AI site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract built site
        run: |
          rm -rf site
          unzip -q "LONGRISE-AI-MAIN-main (2).zip"
          cp -R "LONGRISE-AI-MAIN-main/LONGRISE-AI-MAIN-main/dist" site
          touch site/.nojekyll
          sed -i 's|src="/assets/|src="./assets/|g; s|href="/assets/|href="./assets/|g' site/index.html

      - name: Publish to gh-pages branch
        run: |
          cd site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy LONGRISE AI site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
