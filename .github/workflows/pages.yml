name: Deploy LONGRISE AI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract built site
        run: |
          rm -rf site
          unzip -q "LONGRISE-AI-MAIN-main (2).zip"
          cp -R "LONGRISE-AI-MAIN-main/LONGRISE-AI-MAIN-main/dist" site
          touch site/.nojekyll
          sed -i 's|src="/assets/|src="./assets/|g; s|href="/assets/|href="./assets/|g' site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
